# 本地或服务器上持续运行：Jira 分配监控 + 可选飞书机器人
# 使用前：将 config.json、.env 放到本目录或通过 volumes 挂载
version: "3.8"

services:
  watcher:
    build: .
    container_name: jira-p4-feishu-watcher
    restart: unless-stopped
    volumes:
      - ./config.json:/app/config.json:ro
      - ./.env:/app/.env:ro
      - ./watcher_state.json:/app/watcher_state.json
      - ./jira_watcher.log:/app/jira_watcher.log
    # 若需 P4，可挂载宿主机 p4 或设置 P4 相关环境变量
    # env_file: .env

  # 飞书群 @ 机器人（可选，与 watcher 二选一或同时开）
